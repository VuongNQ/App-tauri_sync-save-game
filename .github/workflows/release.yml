name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Sync version files to tag version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          $cargo = Get-Content src-tauri/Cargo.toml
          $cargo = $cargo -replace '^version = ".*"$', "version = `"$version`""
          $cargo | Set-Content src-tauri/Cargo.toml

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Save Game Sync ${{ github.ref_name }}"
          releaseBody: "See https://github.com/VuongNQ/App-tauri_sync-save-game/releases/tag/${{ github.ref_name }} for details."
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload latest.json for updater
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "${{ github.ref_name }}"
          $repo = "VuongNQ/App-tauri_sync-save-game"
          $bundleRoot = "src-tauri/target/release/bundle"

          Write-Host "Searching for .sig files under $bundleRoot ..."
          Get-ChildItem $bundleRoot -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

          # Prefer NSIS (.nsis.sig), fall back to MSI (.msi.sig)
          $sigFile = Get-ChildItem $bundleRoot -Recurse `
            | Where-Object { $_.Name -like "*.nsis.sig" } `
            | Select-Object -First 1

          if (-not $sigFile) {
            $sigFile = Get-ChildItem $bundleRoot -Recurse `
              | Where-Object { $_.Name -like "*.msi.sig" } `
              | Select-Object -First 1
          }

          if (-not $sigFile) {
            Write-Error "No .sig file found. Ensure TAURI_SIGNING_PRIVATE_KEY is set in GitHub Secrets."
            exit 1
          }

          Write-Host "Using sig file: $($sigFile.FullName)"

          # Strip the trailing .sig to get the zip asset name
          $zipName  = [System.IO.Path]::GetFileNameWithoutExtension($sigFile.Name)
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$zipName"
          $pubDate     = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          Write-Host "Zip asset : $zipName"
          Write-Host "Download  : $downloadUrl"

          $manifest = [ordered]@{
            version   = $version
            notes     = "See https://github.com/$repo/releases/tag/$tag"
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

          gh release upload $tag "latest.json" --repo $repo --clobber
