name: Release

on:
  push:
    branches:
      - main

jobs:
  publish:
    # Skip if this push is the automated version-bump commit (safety net)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $parts = $conf.version.Split('.')
          $parts[2] = [int]$parts[2] + 1
          $newVersion = $parts -join '.'
          $conf.version = $newVersion
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          $cargo = Get-Content src-tauri/Cargo.toml
          $cargo = $cargo -replace '^version = ".*"$', "version = `"$newVersion`""
          $cargo | Set-Content src-tauri/Cargo.toml

          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Commit bumped version
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.NEW_VERSION }}"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Save Game Sync v__VERSION__"
          releaseBody: "Automated release from main branch."
          releaseDraft: false
          prerelease: false

      - name: Upload latest.json for updater
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.bump.outputs.NEW_VERSION }}"
          $tag = "v$version"
          $repo = "VuongNQ/App-tauri_sync-save-game"
          $bundleDir = "src-tauri/target/release/bundle/nsis"

          # Find the NSIS updater signature file
          $sigFile = Get-ChildItem $bundleDir `
            | Where-Object { $_.Name -like "*.nsis.zip.sig" } `
            | Select-Object -First 1

          if (-not $sigFile) {
            Write-Warning "No .nsis.zip.sig found — TAURI_SIGNING_PRIVATE_KEY may not be configured."
            exit 1
          }

          # BaseName strips the last extension: "app_x64-setup.nsis.zip.sig" -> "app_x64-setup.nsis.zip"
          $zipName  = $sigFile.BaseName
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$zipName"
          $pubDate     = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $manifest = [ordered]@{
            version  = $version
            notes    = "See https://github.com/$repo/releases/tag/$tag"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $manifest | Out-File "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

          gh release upload $tag "latest.json" --repo $repo --clobber
