<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient - deep purple to dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <!-- Neon cyan glow -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <!-- Neon purple glow -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b829dd"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Sync arrow gradient -->
    <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00f5ff" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#b829dd" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSync" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00f5ff" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#000" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" stroke="#2d1b69" stroke-width="3"/>

  <!-- Subtle grid pattern for techy feel -->
  <g opacity="0.06">
    <line x1="96" y1="16" x2="96" y2="496" stroke="#00f5ff" stroke-width="1"/>
    <line x1="176" y1="16" x2="176" y2="496" stroke="#00f5ff" stroke-width="1"/>
    <line x1="256" y1="16" x2="256" y2="496" stroke="#00f5ff" stroke-width="1"/>
    <line x1="336" y1="16" x2="336" y2="496" stroke="#00f5ff" stroke-width="1"/>
    <line x1="416" y1="16" x2="416" y2="496" stroke="#00f5ff" stroke-width="1"/>
    <line x1="16" y1="96" x2="496" y2="96" stroke="#00f5ff" stroke-width="1"/>
    <line x1="16" y1="176" x2="496" y2="176" stroke="#00f5ff" stroke-width="1"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="#00f5ff" stroke-width="1"/>
    <line x1="16" y1="336" x2="496" y2="336" stroke="#00f5ff" stroke-width="1"/>
    <line x1="16" y1="416" x2="496" y2="416" stroke="#00f5ff" stroke-width="1"/>
  </g>

  <!-- Corner accent lines for gamer aesthetic -->
  <g opacity="0.3">
    <!-- Top-left -->
    <line x1="56" y1="56" x2="56" y2="100" stroke="#00f5ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="56" x2="100" y2="56" stroke="#00f5ff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Top-right -->
    <line x1="456" y1="56" x2="456" y2="100" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="456" y1="56" x2="412" y2="56" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bottom-left -->
    <line x1="56" y1="456" x2="56" y2="412" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="456" x2="100" y2="456" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bottom-right -->
    <line x1="456" y1="456" x2="456" y2="412" stroke="#00f5ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="456" y1="456" x2="412" y2="456" stroke="#00f5ff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Game Controller - main body -->
  <g filter="url(#glowCyan)" transform="translate(256, 240)">
    <!-- Controller body -->
    <path d="M-120,-30 C-120,-60 -90,-80 -55,-80 L55,-80 C90,-80 120,-60 120,-30
             L120,10 C120,30 135,70 145,90 C155,115 140,135 115,135
             L85,135 C70,135 60,120 50,100 L35,65 L-35,65 L-50,100
             C-60,120 -70,135 -85,135 L-115,135 C-140,135 -155,115 -145,90
             C-135,70 -120,30 -120,10 Z"
          fill="none" stroke="url(#neonCyan)" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- Controller details -->
  <g transform="translate(256, 240)">
    <!-- D-pad (left side) -->
    <g filter="url(#glowPurple)">
      <rect x="-75" y="-40" width="12" height="36" rx="3" fill="url(#neonPurple)"/>
      <rect x="-87" y="-28" width="36" height="12" rx="3" fill="url(#neonPurple)"/>
    </g>

    <!-- Action buttons (right side) - ABXY style -->
    <g filter="url(#glowCyan)">
      <circle cx="69" cy="-35" r="8" fill="none" stroke="#00f5ff" stroke-width="2.5"/>
      <circle cx="85" cy="-22" r="8" fill="none" stroke="#ff4a8d" stroke-width="2.5"/>
      <circle cx="53" cy="-22" r="8" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
      <circle cx="69" cy="-9" r="8" fill="none" stroke="#00ff88" stroke-width="2.5"/>
    </g>

    <!-- Analog sticks -->
    <g filter="url(#glowCyan)">
      <circle cx="-45" cy="15" r="14" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.7"/>
      <circle cx="-45" cy="15" r="6" fill="#00f5ff" opacity="0.4"/>
      <circle cx="45" cy="35" r="14" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.7"/>
      <circle cx="45" cy="35" r="6" fill="#00f5ff" opacity="0.4"/>
    </g>

    <!-- Center button / home -->
    <circle cx="0" cy="-15" r="10" fill="none" stroke="#8b5cf6" stroke-width="2" filter="url(#glowPurple)" opacity="0.8"/>
  </g>

  <!-- Sync arrows - circular arrows above controller -->
  <g transform="translate(256, 130)" filter="url(#glowSync)">
    <!-- Circular sync arrow 1 (clockwise top) -->
    <path d="M-28,0 A28,28 0 0,1 24,-14"
          fill="none" stroke="url(#syncGrad)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="28,-18 18,-6 32,-4" fill="#00f5ff"/>
    <!-- Circular sync arrow 2 (counter-clockwise bottom) -->
    <path d="M28,0 A28,28 0 0,1 -24,14"
          fill="none" stroke="url(#syncGrad)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="-28,18 -18,6 -32,4" fill="#8b5cf6"/>
  </g>

  <!-- Cloud outline subtly behind sync -->
  <g transform="translate(256, 122)" opacity="0.25">
    <path d="M-42,14 C-52,14 -58,6 -58,-4 C-58,-14 -50,-22 -40,-22
             C-38,-32 -28,-40 -16,-40 C-6,-40 2,-34 6,-26
             C10,-30 16,-32 22,-32 C36,-32 48,-22 48,-8
             C48,4 40,14 28,14 Z"
          fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- Small decorative dots (pixel art style) -->
  <g opacity="0.15">
    <rect x="80" y="380" width="6" height="6" fill="#00f5ff"/>
    <rect x="92" y="380" width="6" height="6" fill="#00f5ff"/>
    <rect x="80" y="392" width="6" height="6" fill="#00f5ff"/>
    <rect x="414" y="380" width="6" height="6" fill="#8b5cf6"/>
    <rect x="426" y="380" width="6" height="6" fill="#8b5cf6"/>
    <rect x="426" y="392" width="6" height="6" fill="#8b5cf6"/>
  </g>

  <!-- "SYNC" text at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="12" fill="url(#syncGrad)" filter="url(#glowSync)" opacity="0.85">SYNC</text>

</svg>
